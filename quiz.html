<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>灵魂食笺 · 你是哪道文学菜肴？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('my-bg.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #faf3e0;
            font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #4a3729;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');

        .container {
            max-width: 700px;
            width: 100%;
            margin: 20px auto;
        }

        .card {
            background: #faf6e9;
            border-radius: 48px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2),
                        0 0 0 6px #efe0c6,
                        0 0 0 12px #d9c2a7;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-inner {
            padding: 28px 32px;
            background: #faf6e9;
        }

        .progress-area {
            margin-bottom: 20px;
        }
        .progress-bar-bg {
            background: #e8dcc8;
            border-radius: 40px;
            height: 6px;
            overflow: hidden;
        }
        .progress-fill {
            background: #c4815a;
            width: 0%;
            height: 100%;
            border-radius: 40px;
            transition: width 0.3s ease;
        }
        .progress-text {
            text-align: right;
            font-size: 12px;
            margin-top: 6px;
            color: #b28b65;
            letter-spacing: 0.5px;
            font-family: monospace;
        }

        .question-text {
            font-size: 26px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 24px;
            color: #5c3e2a;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }
        .option-btn {
            background: #fffdf7;
            border: 1.5px solid #e2cfb0;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 16px;
            text-align: left;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            color: #5c3e2a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover {
            background: #f4e5d4;
            border-color: #c79a6e;
            transform: scale(0.98);
        }
        .option-btn.selected {
            background: #d9b48b;
            border-color: #a5612c;
            color: white;
            box-shadow: 0 4px 10px rgba(160, 100, 40, 0.2);
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid #cfb68c;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cormorant Garamond', serif;
            color: #8b694a;
        }
        .nav-btn.primary {
            background: #c4815a;
            border: none;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .nav-btn.primary:hover {
            background: #a86032;
            transform: translateY(-2px);
        }
        .nav-btn:active {
            transform: scale(0.96);
        }

        .result-dish {
            text-align: center;
        }
        .dish-name {
            font-size: 36px;
            font-weight: 700;
            color: #b55a2a;
            margin: 10px 0 8px;
            letter-spacing: 2px;
            font-family: 'Cormorant Garamond', 'Georgia', serif;
        }
        .dish-sub {
            font-size: 16px;
            color: #a07a56;
            border-bottom: 2px dotted #e7cfae;
            display: inline-block;
            padding-bottom: 4px;
            margin-bottom: 16px;
            font-style: italic;
        }
        .dish-desc {
            text-align: left;
            background: #fffdf7;
            padding: 22px;
            border-radius: 28px;
            margin: 16px 0;
            line-height: 1.7;
            font-size: 16px;
            color: #4a3729;
            border-left: 6px solid #d9aa7a;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            box-shadow: inset 0 0 0 1px #f8efdf, 0 4px 12px rgba(0,0,0,0.05);
        }
        .dish-quote {
            font-style: italic;
            margin-top: 16px;
            padding-top: 10px;
            border-top: 1px solid #ecdbba;
            color: #c48a5c;
            text-align: center;
            font-size: 17px;
            font-family: 'Cormorant Garamond', serif;
        }
        .restart-btn {
            background: #c4815a;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: bold;
            color: white;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Cormorant Garamond', serif;
        }
        .restart-btn:hover {
            background: #9b542c;
            transform: scale(0.96);
        }

        footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: #c9a87b;
            font-family: monospace;
        }

        @media (max-width: 550px) {
            .card-inner { padding: 20px 18px; }
            .question-text { font-size: 22px; }
            .dish-name { font-size: 28px; }
            .option-btn { padding: 10px 14px; font-size: 14px; }
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // 21道题 + 每道题的选项分值（灵活分配）
    const questions = [
        { text: "周末你更享受？", options: ["宅在家中独自看书/刷剧", "小范围好友聚餐", "认识新朋友的派对", "出门遛弯/逛街购物"], scores: [1, 2, 4, 3] },
        { text: "面对难题，你通常？", options: ["按计划逐步分析", "凭直觉快速行动", "询问他人建议", "先搁置，等灵感"], scores: [2, 3, 1, 4] },
        { text: "哪种环境让你充电？", options: ["静谧自然（公园）", "舒适的家里", "热闹的咖啡馆/市集", "陌生的异国街头"], scores: [1, 2, 3, 4] },
        { text: "你更重视？", options: ["平静淡然的日子", "家庭与亲密关系", "新奇与刺激新体验", "自由与独立"], scores: [1, 2, 4, 3] },
        { text: "朋友形容你最多的是？", options: ["冷静理性", "热情感性", "幽默风趣", "神秘深沉"], scores: [1, 4, 3, 2] },
        { text: "如果去异国旅行，你会优先？", options: ["历史遗迹", "街头小吃", "自然奇观", "当地人家做客"], scores: [1, 2, 3, 4] },
        { text: "你更擅长？", options: ["逻辑推理", "共情沟通", "创意发散", "危机处理"], scores: [1, 3, 4, 2] },
        { text: "你偏好的艺术风格？", options: ["自然复古与抽象类", "潮流朋克与亚文化类", "地域特色文化类", "古典浪漫主义"], scores: [1, 4, 2, 3] },
        { text: "面对压力，你会？", options: ["整理待办清单", "找朋友倾诉", "运动/大吃一顿", "躲起来放空"], scores: [1, 4, 3, 2] },
        { text: "你更怀念/在意？", options: ["童年的味道", "远方的未知", "一段逝去的感情", "从未说出口的一些话"], scores: [1, 4, 2, 3] },
        { text: "你认为自己？", options: ["务实可靠", "浪漫随性", "叛逆不羁", "矛盾复杂"], scores: [1, 3, 4, 2] },
        { text: "你更愿意学习？", options: ["一门手艺", "一门语言", "一种乐器", "一种哲学"], scores: [1, 4, 3, 2] },
        { text: "在团队中，你常是？", options: ["策略家", "润滑剂", "执行者", "旁观者"], scores: [2, 3, 4, 1] },
        { text: "你对“奢侈”的定义？", options: ["时间自由", "极致工艺", "独特体验", "心灵平静"], scores: [1, 2, 3, 4] },
        { text: "你更容易被哪种人吸引？", options: ["沉稳神秘", "鲜活热烈", "幽默聪明", "温柔包容"], scores: [1, 4, 3, 2] },
        { text: "你相信命运吗？", options: ["更信选择", "更信缘分", "更信随机", "更信因果"], scores: [2, 3, 4, 1] },
        { text: "你更常做哪种梦？", options: ["现实的场景的不同折射", "怪诞奇幻的冒险", "清醒/控制/不可言说的梦", "不做梦"], scores: [1, 4, 3, 2] },
        { text: "你偏好哪种季节？", options: ["春", "夏", "秋", "冬"], scores: [3, 4, 2, 1] },
        { text: "你更享受？", options: ["独自完成作品", "合作创造", "即兴发挥", "指导/教会他人"], scores: [1, 3, 4, 2] },
        { text: "你希望他人记住你？", options: ["可靠背影", "有趣灵魂", "深刻思想", "温柔善意"], scores: [1, 4, 2, 3] },
        { text: "你最喜欢以下哪种香味？", options: ["雨后泥土与青草的气息", "烤面包与黄油的暖香", "海风与咸湿的空气", "旧书页与木质调"], scores: [2, 4, 3, 1] }
    ];

    // 常规菜品数据（新的分数段分配：前4段5分，中8段3分，后4段5分）
    const regularDishes = [
        { min: 21, max: 25, name: "普鲁斯特的玛德琳蛋糕", origin: "《追忆似水年华》·法国", personality: "记忆收藏家", desc: "你活在时间的褶皱里。一块蛋糕、一缕气味、一个瞬间，都能让你跌入漫长的内心独白。你不是在回忆过去，而是在反复咀嚼、重塑它——那些细节在你脑中比现实更清晰。外人看来你有些忧郁，但你知道那是你与自己对话的方式。你适合写作、艺术、任何需要细腻感知的领域。你不害怕孤独，因为你的内心从不空旷。", quote: "失去的乐园，才是唯一的乐园。" },
        { min: 26, max: 30, name: "冷黄瓜酸奶汤", origin: "土耳其·《我的名字叫红》", personality: "清凉的观察者", desc: "你是人群中那个不容易被情绪裹挟的人。当所有人都在争吵、激动、失控时，你还能端出一碗冰凉的逻辑。你不是冷漠，而是相信——燥热的问题，需要清凉的解法。你擅长化繁为简，也擅长在混乱中找到关键。别人觉得你有点“远”，但你知道，真正的热情不需要喧哗。", quote: "先冷静，再回应。" },
        { min: 31, max: 35, name: "豌豆粥配腌鱼", origin: "冰岛·《独立的人们》", personality: "苔原上的坚守者", desc: "你接受生活的粗粝，甚至从中品出诗意。你不追求精致，但追求真实。别人抱怨环境恶劣时，你已经默默生起了火。你有一种“苔原性格”——缓慢、沉默、但不可摧毁。你不需要很多人的认可，你只需要自己的土地和方向。", quote: "甜是恩赐，咸是本事。" },
        { min: 36, max: 40, name: "蛤蜊浓汤配黑面包", origin: "《白鲸》·美国新英格兰", personality: "沉默的水手", desc: "你不怕单调和重复，甚至在其中找到安宁。你相信真实的地方从来不登上地图，真正的目的地往往存在于常规认知之外。你习惯用行动代替言语——像一艘独自航行的船，不需要观众，只需要方向。你不擅长表达爱，但你从不缺席。", quote: "灯塔不说话，但船都看得见。" },
        { min: 41, max: 43, name: "桂花糯米藕", origin: "《红楼梦》·中国江南", personality: "外柔内刚的旧梦人", desc: "你看似甜软、温顺、好说话。但咬开之后，你会发现——你有筋骨，有棱角，有绝不退让的底线。你擅长在不声不响中达成目的，像藕一样——断开来，丝还连着。你懂得人情世故，但你不世故。你温柔，但你从不软弱。", quote: "柔软是一种主动的选择，不是天生的。" },
        { min: 44, max: 46, name: "抹茶蕨饼配黑蜜", origin: "《千与千寻》·日本", personality: "静谧的深湖", desc: "你外表像一杯抹茶——清苦、冷静、克制。但入口之后，黑蜜的甜会慢慢涌上来。你不喜欢喧哗，不爱表达，但你的内心剧场从不落幕。你擅长倾听，擅长记住细节，擅长在沉默中理解他人。你不争，但没有人能忽略你。", quote: "静水深流，不争自有声。" },
        { min: 47, max: 49, name: "红酒炖牛肉", origin: "《美食、祈祷和恋爱》·勃艮第", personality: "温柔的炼金师", desc: "你天生是照顾者、疗愈者。你相信时间的力量。你不急着要结果，因为你相信——慢工出细活。你用心感受生活，好好享受跟自己相处的时光。你是朋友在低谷时第一个想起的人，你的温暖如同慢炖牛肉的小火苗。", quote: "慢慢来，一切终会流向目的地。" },
        { min: 50, max: 52, name: "晨雾中的蜂蜜烤面包配无花果", origin: "《希腊人佐巴》·克里特岛", personality: "黎明的诗人", desc: "你不在意世界的眼光，但你在别人看不见的地方保持仪式感。你相信——伟大的灵魂，都藏在平凡的早餐里。你不是冷淡，你只是把热情留给了清晨。无论发生什么，你仍然保持对生活最纯真的热爱，用身体对抗命运，活得尽兴。", quote: "真正的魔法，不是拯救世界，而是日复一日地温柔对待自己。" },
        { min: 53, max: 55, name: "橄榄油浸章鱼配鹰嘴豆", origin: "《奥德赛》·希腊", personality: "归来的漂泊者", desc: "你经历过漫长的漂泊——地理上的，或心灵上的。你靠聪明而非蛮力活下来，像章鱼一样柔软又危险。那些弯路没有毁掉你，反而成了你的勋章。你最终会找到归途，但你不会忘记大海，因为在大海中你找到了自己。", quote: "我可以漂，我选择漂。" },
        { min: 56, max: 58, name: "覆盆子酱馅小馅饼", origin: "《罪与罚》·俄罗斯", personality: "矛盾的灵魂", desc: "你内心常有理想与现实的拉锯。你想做好人，但常常被黑暗的念头纠缠。你爱得深，也痛得深。你渴望被理解，又害怕暴露自己的裂缝。你像那颗馅饼——咬开是红色的，酸甜交织，热烈又苦涩。", quote: "只有深刻挣扎过的人，才懂真正的善良。" },
        { min: 59, max: 61, name: "松露黄油煮土豆配风干火腿", origin: "《厨房机密》·法意边境", personality: "追求生活的享乐者", desc: "你可能是那种看起来最不追求“精致”的人——不求最新、不追潮流。但你会在朋友来家里时，用上精心的茶杯；在写东西时，拿出精美的钢笔。你不喜欢用Logo证明自己。你相信真正的品味藏在细节里，在质朴的生活中追求极致。", quote: "荒诞的生活中藏着极致的美。" },
        { min: 62, max: 64, name: "那不勒斯焗烤茄子", origin: "《我的天才女友》·意大利", personality: "草根里的火焰", desc: "你从不认命，愿意把苦难熬成故事。你身上有一种“向上的野蛮力”——不甘、不服、不停。看似温柔的外表下是不被理解的野心。你从不忘记自己从哪里来。你共情底层，也渴望高处。", quote: "我们本就要在血与火中杀出自己的路。" },
        { min: 65, max: 69, name: "摩洛哥哈里拉羊肉汤", origin: "《卡萨布兰卡》·摩洛哥", personality: "香料的调和者", desc: "你是天生的东道主。你能让任何人感到被欢迎、被接纳。你身上有十几种香料的层次——甜、辛、酸、咸交织在一起。你善于调和矛盾，也善于把陌生人变成朋友。你相信：孤独是一种浪费，分享才是真理。", quote: "越多越丰富，越杂越迷人。" },
        { min: 70, max: 74, name: "咖喱蟹配椰浆饭", origin: "娘惹·《娘惹回忆》", personality: "文化的混血儿", desc: "你天生讨厌单一。东方与西方、传统与现代、经典与叛逆——在你身上共存，且毫不违和。你是聚会中的惊喜，是团队里的创意引擎。你相信：最美的东西都诞生在交界处。", quote: "纯粹是神话，杂交才是现实。" },
        { min: 75, max: 79, name: "香蕉叶包烤鱼", origin: "《恰似水于巧克力》·墨西哥", personality: "火焰般的恋人", desc: "你的情绪像火焰——烧起来很烈，一触即发。你相信食物、性、爱都是生命的仪式。你通过自己的方式肆意地表达对于生命不公的不满态度，或许有一个热爱的事情是你情绪的发泄口。你活着，用尽全力地活着。", quote: "生活需要创造与反抗来点燃。" },
        { min: 80, max: 84, name: "龙息辣椒炖肉", origin: "《冰与火之歌》·维斯特洛", personality: "火焰的守护者", desc: "你仿佛一团移动的火焰。情绪来得快，去得也快。你对朋友两肋插刀，对敌人绝不手软。你受不了虚伪和磨叽，喜欢直来直去。你的爱是夜空中滚烫的星，你的恨也是。", quote: "至死方休。" }
    ];

    // 隐藏菜肴数据
    const hiddenDishes = {
        "仰望星空派": { origin: "康沃尔·荒诞诗篇", personality: "荒诞的诚实者", desc: "你故意用荒诞对抗平庸，用讽刺表达深情。人们要么爱死你，要么怕死你。你相信：乱来才是最高级的秩序。", quote: "鱼应该仰望星空，人应该偶尔荒唐。" },
        "永远饥饿的蜂蜜酒": { origin: "瓦尔哈拉·《诗体埃达》", personality: "永不满足的追寻者", desc: "你是哲学家、流浪者或酒徒——永远在寻找“下一口真理”。你孤独，但自由。你饥饿，但清醒。", quote: "饱足是死亡，饥饿才是活着。" },
        "食罪者的面包与盐": { origin: "中世纪民俗", personality: "悲悯的承担者", desc: "你习惯吃掉别人的痛苦，背负不属于你的罪。你是世界上最好的朋友，却是最亏待自己的人。", quote: "先喂饱自己，再喂养世界。" },
        "梦神的花瓣蜜饯": { origin: "《变形记》·古希腊罗马", personality: "梦幻的织网者", desc: "你活在现实与梦境的缝隙，常说出预言般的句子。你的存在让世界柔软，但也让你容易受伤。", quote: "梦不是逃避，是另一种真实。" },
        "无法命名的虚空炖菜": { origin: "博尔赫斯·《小径分岔的花园》", personality: "无限的可能性", desc: "你拒绝被定义，永远在变化。你今天是一种味道，明天是另一种。你是镜子里的迷宫，永远找不到核心。", quote: "名字是监狱，我是逃犯。" }
    };

    function getHiddenDish(answers, total) {
        const a = answers;
        if (a[1] === 4 && a[8] === 3 && a[14] === 2 && total >= 70) return "仰望星空派";
        if (a[11] === 4 && a[15] === 4 && a[16] === 4 && total >= 75) return "永远饥饿的蜂蜜酒";
        if (a[4] === 1 && a[10] === 4 && a[18] === 1 && a[19] === 4) return "食罪者的面包与盐";
        if (a[2] === 1 && a[7] === 3 && a[9] === 4 && a[17] === 1) return "梦神的花瓣蜜饯";
        if ((total === 42 || total === 63) && a[19] === 3) return "无法命名的虚空炖菜";
        return null;
    }

    function getRegularDish(score) {
        for(let d of regularDishes) {
            if(score >= d.min && score <= d.max) return d;
        }
        return regularDishes[0];
    }

    let currentIndex = 0;
    let answers = new Array(21).fill(null);
    let appEl = document.getElementById('app');

    function renderQuestion() {
        const q = questions[currentIndex];
        const selectedVal = answers[currentIndex];
        const optionsHtml = q.options.map((opt, idx) => {
            const val = idx;
            const isSelected = (selectedVal === val);
            const letter = String.fromCharCode(65+idx);
            return `<button class="option-btn ${isSelected ? 'selected' : ''}" data-val="${val}">${letter}. ${opt}</button>`;
        }).join('');
        const progressPercent = ((currentIndex) / 21) * 100;
        const html = `
            <div class="card">
                <div class="card-inner">
                    <div class="progress-area">
                        <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
                        <div class="progress-text">第 ${currentIndex+1} / 21 题</div>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="options-group" id="optionsGroup">
                        ${optionsHtml}
                    </div>
                    <div class="nav-buttons">
                        <button class="nav-btn" id="prevBtn" ${currentIndex===0 ? 'disabled style="opacity:0.4"' : ''}>◀ 上一题</button>
                        <button class="nav-btn primary" id="nextBtn">${currentIndex===20 ? '✨ 揭晓我的菜肴 ✨' : '下一题 ▶'}</button>
                    </div>
                </div>
            </div>
            <footer>灵魂食笺 · 每一道菜都是一面灵魂的镜子</footer>
        `;
        appEl.innerHTML = html;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const val = parseInt(btn.dataset.val);
                answers[currentIndex] = val;
                renderQuestion();
            });
        });
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if(currentIndex > 0) { currentIndex--; renderQuestion(); }
        });
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            if(answers[currentIndex] === null) {
                alert("请先选择一个选项 🌟");
                return;
            }
            if(currentIndex === 20) {
                computeResult();
            } else {
                currentIndex++;
                renderQuestion();
            }
        });
    }

    function computeResult() {
        let total = 0;
        for(let i=0;i<21;i++) {
            const selectedIdx = answers[i];
            if(selectedIdx !== null) {
                total += questions[i].scores[selectedIdx];
            }
        }
        const hiddenKey = getHiddenDish(answers, total);
        let dishName, dishData, isHidden=false;
        if(hiddenKey) {
            isHidden = true;
            dishName = hiddenKey;
            dishData = hiddenDishes[hiddenKey];
        } else {
            const regular = getRegularDish(total);
            dishName = regular.name;
            dishData = { origin: regular.origin, personality: regular.personality, desc: regular.desc, quote: regular.quote };
        }
        const hiddenBadge = isHidden ? '<span style="background:#c9ab7b; padding:4px 12px; border-radius:40px; font-size:14px;">✨ 隐藏菜肴 ✨</span>' : '';
        const resultHtml = `
            <div class="card">
                <div class="card-inner result-dish">
                    ${hiddenBadge}
                    <div class="dish-name">${dishName}</div>
                    <div class="dish-sub">${dishData.origin}</div>
                    <div class="dish-desc">
                        <strong>🍽️ 灵魂人格 · ${dishData.personality}</strong><br><br>
                        ${dishData.desc}
                    </div>
                    <div class="dish-quote">“ ${dishData.quote} ”</div>
                    <button class="restart-btn" id="restartBtn">🌿 重新品尝 🌿</button>
                </div>
            </div>
            <footer>测测你的朋友是哪道文学菜肴？</footer>
        `;
        appEl.innerHTML = resultHtml;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            answers = new Array(21).fill(null);
            currentIndex = 0;
            renderQuestion();
        });
    }

    renderQuestion();
</script>
</body>
</html>
